# Nginx — proxy reverso para o fatoz (porta 3002 do PM2).
# Salve como: /etc/nginx/sites-available/fatoz.com.br
# Ative com:  sudo ln -s /etc/nginx/sites-available/fatoz.com.br /etc/nginx/sites-enabled/
# Teste:      sudo nginx -t   e recarregue:  sudo systemctl reload nginx
# Depois rode o certbot para o HTTPS (ele adiciona o bloco 443 automaticamente).

server {
    listen 80;
    listen [::]:80;
    server_name fatoz.com.br www.fatoz.com.br;

    # Tamanho de upload (logo/banner em base64 podem ser grandes)
    client_max_body_size 12M;

    # Cache dos assets estáticos do Next
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }
}
